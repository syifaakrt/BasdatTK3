{% extends 'base.html' %}
{% load static %}

{% block meta %}
    <title>Login - AeroMiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock meta %}

{% block content %}
<div class="bg-[#f8f9fc] min-h-screen flex items-center justify-center py-10 px-4 font-sans">
    
    <div class="max-w-[450px] w-full">
        
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-[#0c3b7a] text-white rounded-xl flex items-center justify-center text-xl mx-auto mb-4 shadow-md">
                <i class="fa-solid fa-plane"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Selamat Datang</h1>
            <p class="text-gray-500 text-sm">Masuk ke akun AeroMiles Anda</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            
            <form action="" method="POST">
                {% csrf_token %} 

                <div class="mb-6">
                    <h2 class="text-base font-bold text-gray-800 mb-1">Login</h2>
                    <p class="text-xs text-gray-500 mb-6">Masukkan email dan password Anda</p>

                    <div class="mb-5">
                        <label class="block text-xs font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" name="email" placeholder="email@example.com" class="w-full border border-gray-300 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-[#0c3b7a] focus:ring-1 focus:ring-[#0c3b7a] placeholder-gray-400" required>
                    </div>

                    <div class="mb-8">
                        <label class="block text-xs font-semibold text-gray-700 mb-2">Password</label>
                        <input type="password" name="password" placeholder="••••••••" class="w-full border border-gray-300 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-[#0c3b7a] focus:ring-1 focus:ring-[#0c3b7a] placeholder-gray-400" required>
                    </div>

                    <button type="submit" class="w-full bg-[#0c3b7a] hover:bg-[#0a2f63] text-white font-semibold py-3 rounded-lg text-sm transition-colors mb-6 shadow-sm">
                        Log In
                    </button>

                    <div class="text-center text-sm text-gray-500">
                        Belum punya akun? 
                        <a href="#" class="text-[#2e7dd6] hover:text-[#0c3b7a] font-semibold transition-colors">Daftar di sini</a>
                    </div>

                </div>
            </form>
            
        </div>
    </div>

</div>
{% endblock content %}
