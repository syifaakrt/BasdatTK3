{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AeroMiles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">
  <div class="bg-white rounded-2xl p-9 w-[360px] shadow-xl">
    <div class="text-xl font-bold text-[#0f1f3d] mb-1 flex items-center gap-2">✈ AeroMiles</div>
    <div class="text-sm text-[#7a8ca8] mb-7">Masuk ke akun Anda</div>

    {% if messages %}
      {% for message in messages %}
      <div class="bg-red-50 text-red-800 text-xs px-3 py-2 rounded-md mb-3">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="flex flex-col gap-1.5 mb-3.5">
        <label class="text-xs text-[#7a8ca8] font-medium">Email</label>
        <input type="email" name="email" placeholder="email@example.com" required autofocus
          class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm text-[#1a2540] outline-none focus:border-[#1a3a6e] transition">
      </div>
      <div class="flex flex-col gap-1.5 mb-5">
        <label class="text-xs text-[#7a8ca8] font-medium">Password</label>
        <input type="password" name="password" placeholder="Password" required
          class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm text-[#1a2540] outline-none focus:border-[#1a3a6e] transition">
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-[#1a3a6e] hover:bg-[#22509e] text-white text-sm font-semibold rounded-lg transition">
        Masuk
      </button>
    </form>
  </div>
</body>
</html>
