{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AeroMiles</title>
  <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; }
    .login-box {
      background: #fff;
      border-radius: 14px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .login-brand {
      font-size: 20px;
      font-weight: 700;
      color: #0f1f3d;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-sub {
      font-size: 13px;
      color: #7a8ca8;
      margin-bottom: 28px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; color: #7a8ca8; font-weight: 500; }
    .form-group input {
      padding: 9px 12px;
      border: 1px solid #dde2ec;
      border-radius: 7px;
      font-size: 13px;
      color: #1a2540;
      outline: none;
      transition: border 0.15s;
    }
    .form-group input:focus { border-color: #1a3a6e; }
    .btn-login {
      width: 100%;
      padding: 10px;
      background: #1a3a6e;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #22509e; }
    .error-msg {
      background: #fde8e8;
      color: #8b1a1a;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-brand"><span>✈</span> AeroMiles</div>
    <div class="login-sub">Masuk ke akun Anda</div>

    {% if messages %}
      {% for message in messages %}
      <div class="error-msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn-login">Masuk</button>
    </form>
  </div>
</body>
</html>
